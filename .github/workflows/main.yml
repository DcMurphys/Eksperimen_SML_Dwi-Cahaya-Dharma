# Action workflow metadata
name: Data Preprocessing Automation

# Trigger action
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Define job
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1) Checkout repository
      uses: actions/checkout@v4

    - name: 2) Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'

    - name: 3) Install Dependencies listed on requirements
      run: | 
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4) Run preprocessing script file 
      run: python ../../automate_Dwi-Cahaya-Dharma.py 
