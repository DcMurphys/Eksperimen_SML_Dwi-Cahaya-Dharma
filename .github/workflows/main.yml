# Action workflow metadata
name: Data Preprocessing Automation

# Trigger action
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Mengatur hak akses repository ke 'write'
permissions: 
  contents: write

# Eksekusi job task
jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: 1) Checkout repository
      uses: actions/checkout@v4

    - name: 2) Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.5'

    - name: 3) Install Dependencies listed on requirements
      run: | 
        python -m pip install --upgrade pip
        pip install -r .github/workflows/requirements.txt

    - name: 4) Run preprocessing script file 
      run: python preprocessing/automate_Dwi-Cahaya-Dharma.py 

    - name: 5) Commit and push processed files from preprocessing script file
      run: | 
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add preprocessing/encoder/
        git add preprocessing/scaler/
        git add preprocessing/pca/
        git add preprocessing/telco_preprocessing/

        git diff --quiet && git diff --staged --quiet || (git commit -m "chore(automated): update preprocessed dataset & artifacts [skip ci]" && git push)
